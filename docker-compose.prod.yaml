version: "3.8"

services:
  wpdb:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: exampledb
      MYSQL_USER: exampleuser
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
    volumes:
      - db:/var/lib/mysql
      #- ./testdb:/docker-entrypoint-initdb.d
    networks:
      - wpnet
    secrets:
      - source: mysql_password
      - source: mysql_root_password

  wordpress:
    build: https://git@github.com/bearbird/wp-fpm-ffmpeg.git
    restart: always
    ports:
      - 80:80
    environment:
      WORDPRESS_DB_HOST: wpdb
      WORDPRESS_DB_USER: exampleuser
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/mysql_password
      WORDPRESS_DB_NAME: exampledb
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
    volumes:
      - wpdata:/var/www/html
      - ./:/var/www/html/wp-content
    networks:
      - wpnet
    secrets:
      - source: mysql_password

  wpcli:
    depends_on:
      - wordpress
      - wpdb
    image: wordpress:cli
    restart: always
    command: >
      /bin/sh -c '
      sleep 10;
      wp core install  --url="http://${DOMAIN}" --title="dam" --admin_user=admin --admin_password=${WPPASSWORD} --admin_email=${EMAIL};
      wp theme activate wp-dam;
      '
    volumes:
      - wpdata:/var/www/html
      - db:/var/lib/mysql
      - ./:/var/www/html/wp-content
    networks:
      - wpnet

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - 8081:80
    environment:
      PMA_HOST: wpdb
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    networks:
      - wpnet

volumes:
  wpdata:
  db:

networks:
  wpnet:

secrets:
  mysql_password:
    file: ../secrets/mysql_password.secret
  mysql_root_password:
    file: ../secrets/mysql_root_password.secret
