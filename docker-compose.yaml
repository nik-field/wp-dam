version: "3.8"

services:

  wordpress:
    build: https://git@github.com/bearbird/wp-fpm-ffmpeg.git
    restart: always
    ports:
      - 80:80
    environment:
      WORDPRESS_DB_HOST: wpdb:3306
      WORDPRESS_DB_USER: exampleuser
      WORDPRESS_DB_PASSWORD: examplepass
      WORDPRESS_DB_NAME: exampledb
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
    volumes:
      - wpdata:/var/www/html
      - ./:/var/www/html/wp-content

  wpcli:
    image: wordpress:cli
    restart: always
    command: >
      /bin/sh -c '
      sleep 10;
      wp core install  --url="http://${DOMAIN}" --title="dam" --admin_user=admin --admin_password=${WPPASSWORD} --admin_email=${EMAIL};
      wp theme activate wp-dam;
      '
    volumes:
      - wpdata:/var/www/html
      - db:/var/lib/mysql
      - ./:/var/www/html/wp-content

  wpdb:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: exampledb
      MYSQL_USER: exampleuser
      MYSQL_PASSWORD: examplepass
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db:/var/lib/mysql
#      - ./testdb:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - 8081:80
    links:
      - wpdb
    environment:
      PMA_HOST: wpdb
      PMA_PORT: 3306
      PMA_ARBITRARY: 1

volumes:
  wpdata:
  db: