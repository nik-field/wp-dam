version: "3.8"

services:
  wpdb:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: exampledb
      MYSQL_USER: exampleuser
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
    volumes:
      - db:/var/lib/mysql
      - ./testdb:/docker-entrypoint-initdb.d
    secrets:
      - source: mysql_password
      - source: mysql_root_password

  wordpress:
    build: https://git@github.com/bearbird/wp-fpm-ffmpeg.git
    restart: always
    ports:
      - 80:80
      - 443:443
    environment:
      WORDPRESS_DB_HOST: wpdb
      WORDPRESS_DB_USER: exampleuser
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/mysql_password
      WORDPRESS_DB_NAME: exampledb
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
        define( 'SCRIPT_DEBUG', true);
        define( 'QM_ENABLE_CAPS_PANEL', true );
        define('WP_HOME','http://${DOMAIN}');
        define('WP_SITEURL','http://${DOMAIN}');
        define('ALLOW_UNFILTERED_UPLOADS', true);
    volumes:
      - wpdata:/var/www/html
      - ./:/var/www/html/wp-content
    secrets:
      - source: mysql_password

  wpcli:
    depends_on:
      - wordpress
      - wpdb
    image: wordpress:cli
    command: >
      /bin/sh -c '
      sleep 15;
      wp search-replace 'dam.local' 'dam.test' wp_postmeta;
      wp theme activate wp-dam;
      wp plugin activate auto-hide-admin-bar;
      wp plugin activate debug-bar;
      wp plugin activate query-monitor;
      '
    volumes:
      - wpdata:/var/www/html
      - db:/var/lib/mysql
      - ./:/var/www/html/wp-content

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - 8081:80
    environment:
      PMA_HOST: wpdb
      PMA_PORT: 3306
      PMA_ARBITRARY: 1

volumes:
  wpdata:
  db:

secrets:
  mysql_password:
    file: ../secrets/mysql_password.secret
  mysql_root_password:
    file: ../secrets/mysql_root_password.secret
