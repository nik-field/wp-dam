version: "3.8"

services:
  wordpress:
    build: https://git@github.com/bearbird/wp-fpm-ffmpeg.git
    restart: always
    ports:
      - 80:80
    environment:
      WORDPRESS_DB_HOST: wpdb
      WORDPRESS_DB_USER: exampleuser
      WORDPRESS_DB_PASSWORD: examplepass
      WORDPRESS_DB_NAME: exampledb
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_SITEURL', 'http://${NO_PROXY}' );
        define( 'WP_HOME', 'http://${NO_PROXY}' );
    volumes:
      - ./:/var/www/html/wp-content

  wpdb:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: exampledb
      MYSQL_USER: exampleuser
      MYSQL_PASSWORD: examplepass
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./testdb:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - 8081:80
    links:
      - wpdb
    environment:
      PMA_HOST: wpdb
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
